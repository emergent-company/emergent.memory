        description: |-
          AutoUninstall, when true, uninstalls the from_version schema after a
          successful auto-migration.
        type: boolean
      customizations:
        additionalProperties: true
        type: object
      dry_run:
        description: |-
          DryRun, when true, computes and returns the full conflict/merge preview
          without making any database changes. The response uses HTTP 200.
        type: boolean
      force:
        description: |-
          Force, when true, allows migration to proceed even when the risk level is
          dangerous. Has no effect if the schema has no migration hints.
        type: boolean
      merge:
        description: |-
          Merge, when true, additively merges incoming type schemas into existing
          registered types rather than skipping conflicting type names.
        type: boolean
      schema_id:
        type: string
    type: object
  domain_schemas.AssignPackResult:
    properties:
      already_installed:
        description: AlreadyInstalled is true when merge=true and the pack was already
          assigned.
        type: boolean
      assignment_id:
        description: AssignmentID is empty for dry-run responses.
        type: string
      conflicts:
        description: Conflicts contains full diff detail for each conflicting type.
        items:
          $ref: '#/definitions/domain_schemas.SchemaConflict'
        type: array
      dry_run:
        description: DryRun mirrors the request flag so callers can distinguish the
          response mode.
        type: boolean
      installed_types:
        description: InstalledTypes are type names newly written to the registry.
        items:
          type: string
        type: array
      merged_types:
        description: MergedTypes are type names whose schemas were additively extended.
        items:
          type: string
        type: array
      migration_block_reason:
        description: MigrationBlockReason describes why migration was not enqueued
          (if blocked).
        type: string
      migration_job_id:
        description: MigrationJobID is set when an async migration job was enqueued.
        type: string
      migration_preview:
        allOf:
        - $ref: '#/definitions/domain_schemas.SchemaMigrationPreviewResponse'
        description: MigrationPreview is populated when dry_run=true and the schema
          has migration hints.
      migration_status:
        description: |-
          MigrationStatus describes the auto-migration state:
          "pending", "skipped", "blocked", "chain_unresolvable"
        type: string
      schema_id:
        type: string
      schema_name:
        type: string
      skipped_types:
        description: SkippedTypes are type names that already existed and were not
          merged.
        items:
          type: string
        type: array
    type: object
