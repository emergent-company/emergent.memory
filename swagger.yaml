    put:
      consumes:
      - application/json
      description: |-
        Idempotent create-or-skip for relationships. Dedup key: (type, src_id, dst_id).
        - If no relationship with the same (type, src_id, dst_id) exists, one is created (HTTP 201).
        - If an identical relationship already exists (same properties), it is returned as-is (HTTP 200).
        - If the relationship exists but was deleted, it is restored (HTTP 200).
