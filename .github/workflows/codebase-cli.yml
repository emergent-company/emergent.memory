name: Codebase CLI Release

on:
  push:
    branches: [main]
    paths:
      - 'blueprints/code-memory-blueprint/cmd/codebase/**'
      - '.github/workflows/codebase-cli.yml'
    tags:
      - 'codebase/v*'
  pull_request:
    branches: [main]
    paths:
      - 'blueprints/code-memory-blueprint/cmd/codebase/**'
      - '.github/workflows/codebase-cli.yml'
  workflow_dispatch:

env:
  GO_VERSION: '1.24'
  WORKING_DIR: blueprints/code-memory-blueprint/cmd/codebase
  MODULE: github.com/emergent-company/emergent.memory/blueprints/code-memory-blueprint/cmd/codebase

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    if: "!startsWith(github.ref, 'refs/tags/')"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{ env.WORKING_DIR }}/go.sum

      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: ${{ env.WORKING_DIR }}
          args: --timeout=5m

  build:
    name: Build
    runs-on: ubuntu-latest
    if: "!startsWith(github.ref, 'refs/tags/')"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{ env.WORKING_DIR }}/go.sum

      - name: Build
        working-directory: ${{ env.WORKING_DIR }}
        env:
          GOWORK: off
          CGO_ENABLED: 0
        run: go build -o /dev/null .

  release:
    name: Release (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/codebase/v')
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{ env.WORKING_DIR }}/go.sum

      - name: Version info
        id: version
        run: |
          # tag format: codebase/v1.2.3 → version: 1.2.3
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#codebase/v}"
          COMMIT=$(git rev-parse --short HEAD)
          BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "commit=$COMMIT" >> $GITHUB_OUTPUT
          echo "build_time=$BUILD_TIME" >> $GITHUB_OUTPUT

      - name: Build binary
        working-directory: ${{ env.WORKING_DIR }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
          GOWORK: off
        run: |
          LDFLAGS="-s -w \
            -X main.Version=${{ steps.version.outputs.version }} \
            -X main.Commit=${{ steps.version.outputs.commit }} \
            -X main.BuildDate=${{ steps.version.outputs.build_time }}"

          mkdir -p dist
          go build -ldflags="$LDFLAGS" -o dist/codebase-${{ matrix.goos }}-${{ matrix.goarch }} .

      - name: Create archive
        working-directory: ${{ env.WORKING_DIR }}/dist
        run: |
          BINARY="codebase-${{ matrix.goos }}-${{ matrix.goarch }}"
          ARCHIVE="${BINARY}.tar.gz"
          tar czf "$ARCHIVE" "$BINARY"
          sha256sum "$ARCHIVE" > "${ARCHIVE}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: codebase-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ env.WORKING_DIR }}/dist/*.tar.gz*
          retention-days: 90

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [release]
    if: startsWith(github.ref, 'refs/tags/codebase/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: codebase-*
          path: dist
          merge-multiple: true

      - name: Merge checksums
        working-directory: dist
        run: |
          cat *.sha256 > checksums.txt
          rm *.sha256
          echo "=== checksums ==="
          cat checksums.txt

      - name: Version info
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          echo "version=${TAG#codebase/v}" >> $GITHUB_OUTPUT

      - name: Previous tag
        id: prev_tag
        run: |
          PREV=$(git tag --sort=-version:refname | grep "^codebase/v" | sed -n '2p' || echo "")
          echo "tag=${PREV:-$(git rev-list --max-parents=0 HEAD)}" >> $GITHUB_OUTPUT

      - name: Release notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          REPO="${{ github.repository }}"
          TAG="${{ github.ref_name }}"

          cat > notes.md << EOF
          ## codebase CLI v${VERSION}

          Populate, audit, and explore the Memory knowledge graph for your codebase.

          ### Install

          **Linux (amd64)**
          \`\`\`bash
          curl -fsSL https://github.com/${REPO}/releases/download/${TAG}/codebase-linux-amd64.tar.gz | tar xz
          chmod +x codebase-linux-amd64
          sudo mv codebase-linux-amd64 /usr/local/bin/codebase
          \`\`\`

          **macOS (Apple Silicon)**
          \`\`\`bash
          curl -fsSL https://github.com/${REPO}/releases/download/${TAG}/codebase-darwin-arm64.tar.gz | tar xz
          chmod +x codebase-darwin-arm64
          sudo mv codebase-darwin-arm64 /usr/local/bin/codebase
          \`\`\`

          **macOS (Intel)**
          \`\`\`bash
          curl -fsSL https://github.com/${REPO}/releases/download/${TAG}/codebase-darwin-amd64.tar.gz | tar xz
          chmod +x codebase-darwin-amd64
          sudo mv codebase-darwin-amd64 /usr/local/bin/codebase
          \`\`\`

          Verify: \`sha256sum -c checksums.txt\`

          ### Downloads

          | Platform | Architecture | File |
          |---|---|---|
          | Linux | amd64 | \`codebase-linux-amd64.tar.gz\` |
          | Linux | arm64 | \`codebase-linux-arm64.tar.gz\` |
          | macOS | Apple Silicon | \`codebase-darwin-arm64.tar.gz\` |
          | macOS | Intel | \`codebase-darwin-amd64.tar.gz\` |

          ### Changes
          $(git log ${{ steps.prev_tag.outputs.tag }}..${{ github.ref_name }} \
            --pretty=format:"- %s (%h)" \
            -- blueprints/code-memory-blueprint/cmd/codebase/ \
            2>/dev/null || echo "- Initial release")
          EOF

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: codebase CLI v${{ steps.version.outputs.version }}
          body_path: notes.md
          files: |
            dist/*.tar.gz
            dist/checksums.txt
          draft: false
          prerelease: false
