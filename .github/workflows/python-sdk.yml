name: Python SDK CI

on:
  push:
    branches: [master, main]
    paths:
      - 'sdk/python/**'
      - '.github/workflows/python-sdk.yml'
  pull_request:
    branches: [master, main]
    paths:
      - 'sdk/python/**'
      - '.github/workflows/python-sdk.yml'
  workflow_dispatch:

defaults:
  run:
    working-directory: sdk/python

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -e '.[dev]'

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -e '.[dev]'

      - name: Mypy
        run: mypy emergent/

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e '.[dev]'

      - name: Run tests
        run: pytest -v --tb=short

      - name: Run tests with coverage
        if: matrix.python-version == '3.12'
        run: pytest --cov=emergent --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: sdk/python/coverage.xml
          flags: python-sdk
          fail_ci_if_error: false

  api-coverage:
    name: API Coverage Check
    runs-on: ubuntu-latest
    # Informational — reports gaps but doesn't block CI
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check API coverage
        working-directory: .
        run: python3 sdk/python/scripts/check_api_coverage.py
