name: Docs

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
    tags:
      - 'v*'
  pull_request:
    paths:
      - 'docs/**'
      - 'mkdocs.yml'

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # mike needs full history

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install -r docs/requirements.txt

      - name: Build docs (strict)
        run: mkdocs build --strict

  deploy-latest:
    name: Deploy latest (main)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install -r docs/requirements.txt

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy as latest
        run: mike deploy --push --update-aliases dev latest

      - name: Sync root-level files to gh-pages
        run: |
          # Copy files before switching branches so they survive the checkout
          cp apps/server/docs/swagger/swagger.json /tmp/swagger.json
          cp apps/server/docs/swagger/swagger.yaml /tmp/swagger.yaml
          cp docs/llms.md /tmp/llms.md
          cp docs/llms-go-sdk.md /tmp/llms-go-sdk.md
          cp docs/llms-swift-sdk.md /tmp/llms-swift-sdk.md
          git fetch origin gh-pages
          git checkout gh-pages
          cp /tmp/swagger.json swagger.json
          cp /tmp/swagger.yaml swagger.yaml
          cp /tmp/swagger.json openapi.json
          cp /tmp/llms.md llms.md
          cp /tmp/llms-go-sdk.md llms-go-sdk.md
          cp /tmp/llms-swift-sdk.md llms-swift-sdk.md
          git add swagger.json swagger.yaml openapi.json llms.md llms-go-sdk.md llms-swift-sdk.md
          git diff --cached --quiet || git commit -m "docs: sync root-level raw files [skip ci]"
          git push origin gh-pages

  deploy-version:
    name: Deploy versioned release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install -r docs/requirements.txt

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Deploy versioned docs and update latest alias
        run: |
          # Remove 'latest' if it exists as a standalone version (not alias) to avoid conflicts
          mike delete --push latest 2>/dev/null || true
          mike deploy --push --update-aliases "${{ steps.version.outputs.VERSION }}" latest
          mike set-default --push latest

      - name: Sync root-level files to gh-pages
        run: |
          # Copy files before switching branches so they survive the checkout
          cp apps/server/docs/swagger/swagger.json /tmp/swagger.json
          cp apps/server/docs/swagger/swagger.yaml /tmp/swagger.yaml
          cp docs/llms.md /tmp/llms.md
          cp docs/llms-go-sdk.md /tmp/llms-go-sdk.md
          cp docs/llms-swift-sdk.md /tmp/llms-swift-sdk.md
          git fetch origin gh-pages
          git checkout gh-pages
          cp /tmp/swagger.json swagger.json
          cp /tmp/swagger.yaml swagger.yaml
          cp /tmp/swagger.json openapi.json
          cp /tmp/llms.md llms.md
          cp /tmp/llms-go-sdk.md llms-go-sdk.md
          cp /tmp/llms-swift-sdk.md llms-swift-sdk.md
          git add swagger.json swagger.yaml openapi.json llms.md llms-go-sdk.md llms-swift-sdk.md
          git diff --cached --quiet || git commit -m "docs: sync root-level raw files [skip ci]"
          git push origin gh-pages
