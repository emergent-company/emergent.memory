# golangci-lint baseline configuration for emergent.memory server module.
# golangci-lint v1.62.2 (v1 config format).
# Thresholds are set high to match the current codebase state.
# Reduce thresholds gradually as large files are refactored.

linters:
  disable-all: true
  enable:
    - govet       # reports suspicious constructs
    - gofmt       # enforces standard formatting
    # deferred: errcheck    — 110 pre-existing violations across 22 files; enable once addressed
    # deferred: staticcheck — 28 pre-existing violations across 10 files; enable once addressed
    # deferred: unused      — 26 pre-existing violations across 12 files; enable once addressed

linters-settings:
  cyclop:
    # max-complexity: 30  # set high — existing code has complex functions; reduce over time
    max-complexity: 30
  funlen:
    # lines: 200  # set high — existing large files; reduce over time
    lines: 200
    statements: 100

issues:
  exclude-dirs:
    # Generated swagger docs — regenerate with `task swagger`; swaggo/swag added to go.mod
    - docs/swagger
  exclude-rules:
    # Ignore generated files
    - path: ".*\\.gen\\.go"
      linters: [errcheck, unused]
    # Ignore migration files
    - path: "migrations/.*"
      linters: [all]
  max-issues-per-linter: 0
  max-same-issues: 0
