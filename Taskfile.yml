version: '3'

dotenv:
  - .env
  - .env.local

includes:
  server:
    taskfile: apps/server/Taskfile.yml
    dir: apps/server

tasks:
  build:
    desc: Build the Go server binary
    cmds:
      - task: server:build

  test:
    desc: Run backend unit tests
    cmds:
      - task: server:test

  test:e2e:
    desc: Run backend e2e tests
    cmds:
      - task: server:test:e2e

  test:integration:
    desc: Run backend integration tests
    cmds:
      - task: server:test:integration

  lint:
    desc: Run Go linter
    cmds:
      - task: server:lint

  migrate:up:
    desc: Run database migrations up
    cmds:
      - task: server:migrate:up

  migrate:down:
    desc: Run database migrations down
    cmds:
      - task: server:migrate:down

  migrate:status:
    desc: Show migration status
    cmds:
      - task: server:migrate:status

  swagger:
    desc: Generate swagger docs
    cmds:
      - task: server:swagger

  dev:
    desc: Start server with hot reload (air, foreground)
    dir: apps/server
    cmds:
      - air
    env:
      PATH: /usr/local/go/bin:/usr/local/bin:{{.PATH}}

  start:
    desc: Build and start server in background
    cmds:
      - task: server:start

  stop:
    desc: Stop background server
    cmds:
      - task: server:stop

  status:
    desc: Check server status
    cmds:
      - task: server:status

  cli:install:
    desc: Build and install the memory CLI to ~/.memory/bin/memory
    dir: tools/cli
    cmds:
      - mkdir -p ~/.memory/bin
      - go build -o ~/.memory/bin/memory ./cmd/main.go
      - echo "Installed memory CLI → ~/.memory/bin/memory"

  traces:list:
    desc: List recent traces from Tempo (memory traces list)
    cmds:
      - memory traces list {{.CLI_ARGS}}

  traces:get:
    desc: Fetch a full trace by ID (memory traces get <traceID>)
    cmds:
      - memory traces get {{.CLI_ARGS}}

  release:
    desc: "Cut a release: bump VERSION, commit, tag, push. Usage: task release VERSION=0.X.Y"
    requires:
      vars: [VERSION]
    cmds:
      - |
        echo "Releasing v{{.VERSION}}"
        echo "{{.VERSION}}" > VERSION
        sed -i "s|// @version .*|// @version {{.VERSION}}|" apps/server/cmd/server/main.go
        git add VERSION apps/server/cmd/server/main.go
        git status
        git commit -m "chore: bump version to {{.VERSION}}"
        git tag v{{.VERSION}}
        git push origin HEAD
        git push origin v{{.VERSION}}
        echo "Tag v{{.VERSION}} pushed — CI will build binaries and create the GitHub Release."
        echo "Monitor: gh run list --workflow=memory-cli.yml"
        echo "After CI: verify images-ready.txt is uploaded to the release."
