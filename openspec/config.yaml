schema: spec-driven

context: |
  Emergent is a knowledge management and AI platform (Go monorepo + separate React UI repo).

  Tech stack:
  - Backend: Go 1.25+, Echo (HTTP), fx (DI), Bun ORM, PostgreSQL 16 + pgvector
  - Auth: Zitadel OIDC, JWT introspection, scope-based authorization
  - AI/ML: Google ADK-Go extraction pipeline, Gemini text-embedding-004, Vertex AI
  - MCP: Custom Echo handlers for Model Context Protocol
  - Migrations: Goose SQL (apps/server/migrations/)
  - Frontend (separate repo): React 19, Vite 7, Tailwind 4, DaisyUI 5, TanStack Table
  - Monorepo tooling: Nx 21, npm workspaces, PM2 via workspace-cli

  Monorepo structure:
  - apps/server/   — Go backend API
  - apps/website/     — Public website (Go)
  - tools/workspace-cli/ — PM2 process management
  - tools/cli/  — CLI operations
  - Frontend lives in separate repo: emergent-company/emergent.memory.ui (/root/emergent.memory.ui)

  Backend architecture:
  - Layered: Handler → Service → Store (Bun)
  - Domain modules under apps/server/domain/
  - HTTP middleware chain: RequireAuth() → RequireScopes() → RequireProjectID()
  - Error types via pkg/apperror, converted to JSON by HTTPErrorHandler
  - Background jobs: PostgreSQL queues with FOR UPDATE SKIP LOCKED

  Domain model:
  - Knowledge graph: Objects + Relationships + Template Packs
  - Ingestion: URL/file → text extraction → chunking → Gemini embeddings → pgvector
  - Search: semantic (pgvector cosine) + lexical (ts_vector) hybrid with cursor pagination
  - Chat: SSE streaming, graph context injection, MCP schema queries

  Conventions:
  - Go: standard error handling via pkg/apperror, fx modules
  - JS/TS: Prettier singleQuote:true, strict TypeScript, ES6 imports
  - Naming: camelCase vars/funcs, PascalCase types/components, kebab-case files
  - Commits: clear 1-2 sentence messages, "why" over "what", scope prefix optional
  - Branches: main (prod), feature/description, fix/description

  Key constraints:
  - PostgreSQL 16+ with pgvector required
  - All API endpoints require JWT (except /health, /ready, /auth/*)
  - Never commit .env files
  - Run migrations before starting server
