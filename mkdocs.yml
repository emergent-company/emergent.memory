      - chunking: go-sdk/reference/chunking.md
      - agents: go-sdk/reference/agents.md
      - agentdefinitions: go-sdk/reference/agentdefinitions.md
      - branches: go-sdk/reference/branches.md
      - projects: go-sdk/reference/projects.md
      - orgs: go-sdk/reference/orgs.md
      - users: go-sdk/reference/users.md
      - apitokens: go-sdk/reference/apitokens.md
      - mcp: go-sdk/reference/mcp.md
      - mcpregistry: go-sdk/reference/mcpregistry.md
