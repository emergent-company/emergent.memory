site_name: Memory SDK Documentation
site_url: https://emergent-company.github.io/emergent.memory/
site_description: Official documentation for the Memory Go SDK and Swift SDK
site_author: Emergent Company
repo_url: https://github.com/emergent-company/emergent.memory
repo_name: emergent-company/emergent.memory

docs_dir: docs/site
theme:
  name: material
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - content.tabs.link
    - content.code.copy
    - toc.follow
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

extra:
  version:
    provider: mike
    default: latest

hooks:
  - docs/hooks/llms_files.py

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Developer Guide:
    - Overview: developer-guide/index.md
    - Provider Setup: developer-guide/provider-setup.md
    - MCP Servers: developer-guide/mcp-servers.md
    - Extraction Pipeline: developer-guide/extraction.md
    - Email Setup: developer-guide/email-setup.md
    - Health & Ops: developer-guide/health-ops.md
    - Security Scopes: developer-guide/security-scopes.md
    - Background Scheduler: developer-guide/scheduler.md
  - User Guide:
    - Overview: user-guide/index.md
    - Getting Started: user-guide/getting-started.md
    - Knowledge Graph: user-guide/knowledge-graph.md
    - Documents: user-guide/documents.md
    - Chat: user-guide/chat.md
    - Agents: user-guide/agents.md
    - Branches: user-guide/branches.md
    - Data Sources: user-guide/datasources.md
    - API Tokens: user-guide/api-tokens.md
